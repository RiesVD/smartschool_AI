<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Analysis Tool</title>
    <link rel="stylesheet" href="analysis_tool.css">
</head>
<body>
    <div class="container">
        <button class="trigger-button">
            <img src="logo_and_icon_brand_kit_nl/Module iconen/analytics_512x512.png" alt="Analytics" class="button-icon">
            <span>View Results</span>
        </button>

        <div class="popout">
            <!-- Analysis View -->
            <div class="analysis-view" id="analysisView">
                <div class="popout-header">
                    <div class="datetime" id="datetime"></div>

                    <div class="select-block">
                        <label for="languageSelect" class="dropdown-label" id="languageLabel">Select language</label>
                        <select id="languageSelect" class="language-dropdown">
                            <option value="nl">Nederlands (Default)</option>
                            <option value="en">English</option>
                            <option value="fr">Français</option>
                        </select>
                    </div>

                    <div class="select-block">
                        <label for="subjectSelect" class="dropdown-label" id="subjectLabel">Select subject</label>
                        <select id="subjectSelect" class="subject-dropdown">
                            <option value="">Select Subject</option>
                            <option value="math">Math</option>
                            <option value="english">English</option>
                            <option value="geography">Geography</option>
                            <option value="science">Science</option>
                            <option value="history">History</option>
                            <option value="physics">Physics</option>
                            <option value="chemistry">Chemistry</option>
                        </select>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-label">Overall Performance</div>
                    <div class="progress-container">
                        <canvas id="progressCanvas" width="180" height="180"></canvas>
                        <div class="progress-info">
                            <div class="percentage-text" id="percentageText">0%</div>
                            <div class="performance-descriptor" id="performanceDescriptor">—</div>
                        </div>
                    </div>
                </div>

                <div class="analysis-content">
                    <div class="test-results-section">
                        <h3 class="test-results-title">📝 Test Results</h3>
                        <div class="test-results-list" id="testResultsList"></div>
                    </div>

                    <div class="upcoming-assignments-section">
                        <div class="assignments-header-container">
                            <div class="assignments-header">📅 Upcoming Tests & Assignments</div>
                            <button class="assignments-toggle" id="assignmentsToggle">
                                <span class="toggle-arrow">▼</span>
                            </button>
                        </div>
                        <div class="upcoming-assignments-content" id="upcomingAssignmentsContent">
                            <div class="assignments-description">Enter expected results to see your potential average</div>
                            <div class="upcoming-assignments-list" id="upcomingAssignmentsList"></div>
                        </div>
                    </div>
                </div>

                <div class="tips-section">
                    <div class="tips-header">💡 Improvement Tips</div>
                    <div class="feedback-container" id="feedbackContainer"></div>
                </div>

                <div class="button-group-vertical">
                    <button class="analyze-button" id="analyzeBtn">Analyze</button>
                    <button class="compare-button" id="compareBtn">Compare Subjects</button>
                </div>
            </div>

            <!-- Comparison View -->
            <div class="comparison-view" id="comparisonView">
                <div class="comparison-header">
                    <h3>Subject Comparison</h3>
                    <button class="close-comparison" id="closeComparisonBtn">×</button>
                </div>
                <div class="comparison-content" id="comparisonContent"></div>
                <div class="comparison-recommendations" id="comparisonRecommendations"></div>
            </div>
        </div>
    </div>

    <script src="analysis_tool.js"></script>
</body>
</html>
